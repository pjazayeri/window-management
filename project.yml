name: WindowManager
options:
  bundleIdPrefix: com.windowmanager
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  WindowManager:
    type: application
    platform: macOS
    sources:
      - Sources/WindowManager
    settings:
      base:
        PRODUCT_NAME: WindowManager
        PRODUCT_BUNDLE_IDENTIFIER: com.windowmanager.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: WindowManager.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing — set to Automatic + your Team ID when you have a dev account
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
    scheme: {}
